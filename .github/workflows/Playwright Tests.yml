name: Playwright Tests

on:
#	push:
#		branches:
#			- main
#      - master
#      - develop
#	pull_request:
#		branches:
#			- main
#     - master
#     - develop
schedule:
  - cron: '0 13 * * *' # Run daily at 8 AM
  workflow_dispatch:


jobs:
#set up test job
	test:
		runs-on: windows-latest
		timeout-minutes: 60
    permissions:
    contents: write

		steps:
			- name: Checkout repository
				uses: actions/checkout@v4

			- name: Set up Node.js
				uses: actions/setup-node@v4
				with:
					node-version: 20
					cache: npm

			- name: Install dependencies
				run: npm ci

			- name: Install Playwright browsers
				run: npx playwright install --with-deps

        -name: Configure enviroment variables from secrets
          run: |
            echo "PRACTICE_USERNAME=${{ secrets.PRACTICE_USERNAME }}" >> $GITHUB_ENV
            echo "PRACTICE_PASSWORD=${{ secrets.PRACTICE_PASSWORD }}" >> $GITHUB_ENV
			
      - name: Run Playwright tests
				run: npm run tests:headless

      - name: upload test-results
        if: always()  
        uses: actions/upload-artifact@v4
        with:
          name: test-results  
          path: test-results/
          retention-days: 30

			- name: Upload Playwright HTML report
				if: always()
				uses: actions/upload-artifact@v4
				with:
					name: playwright-report
					path: playwright-report/
					retention-days: 30
